<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />

		<!-- SEO -->
		<meta
			name="description"
			content="CV interattivo di Stefano Tedeschi, Senior Frontend Engineer. Lo stesso curriculum attraverso dieci ere della UI/UX: Terminale Unix, Windows XP, Skeuomorfismo, Material Design, Brutalismo, Modern Flat, Glassmorphism e il Futuro 3D."
		/>
		<meta name="author" content="Stefano Tedeschi" />
		<meta name="theme-color" content="#4f46e5" />

		<!-- Open Graph -->
		<meta property="og:type" content="profile" />
		<meta property="og:locale" content="it_IT" />
		<meta property="og:title" content="Stefano Tedeschi — CV · Time-Machine Resume" />
		<meta
			property="og:description"
			content="Un curriculum che attraversa le ere della UI/UX: Terminale Unix, Windows XP, Skeuomorfismo, Material Design, Brutalismo, Modern Flat, Glassmorphism e il Futuro 3D."
		/>
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://www.protechstudio.it" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Stefano Tedeschi — CV · Time-Machine Resume" />
		<meta
			name="twitter:description"
			content="Un curriculum che attraversa le ere della UI/UX: Terminale Unix, Windows XP, Skeuomorfismo, Material Design, Brutalismo, Modern Flat, Glassmorphism e il Futuro 3D."
		/>
		<meta name="twitter:image" content="/og-image.png" />

		<!-- Structured data (Person) -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Stefano Tedeschi",
				"jobTitle": "Senior Frontend Engineer",
				"url": "https://www.protechstudio.it",
				"sameAs": ["https://www.linkedin.com/in/stefano-tedeschi-developer/"],
				"address": { "@type": "PostalAddress", "addressLocality": "Torino", "addressCountry": "IT" },
				"knowsAbout": ["Vue", "React", "TypeScript", "Frontend Architecture", "Design Systems"]
			}
		</script>

		<!-- Fonts are self-hosted (latin subset) via src/lib/fonts.css — no render-blocking
		     external stylesheet. Preload only the Timeline font, which is always on screen. -->
		<link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk.woff2" crossorigin />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
