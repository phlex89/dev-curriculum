<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />

		<!-- SEO -->
		<meta
			name="description"
			content="Stefano Tedeschi, Senior Frontend Engineer a Torino con oltre 10 anni di esperienza in Vue, React, TypeScript, architetture frontend e design system. CV interattivo che ripercorre undici ere della UI/UX, dal Terminale Unix al Futuro 3D."
		/>
		<meta
			name="keywords"
			content="Stefano Tedeschi, Senior Frontend Engineer, Frontend Engineer Torino, sviluppatore frontend, Vue, React, TypeScript, Svelte, Angular, design system, component library, architettura frontend, Tailwind CSS, curriculum, CV"
		/>
		<meta name="author" content="Stefano Tedeschi" />
		<meta name="theme-color" content="#4f46e5" />

		<!-- Open Graph -->
		<meta property="og:type" content="profile" />
		<meta property="og:locale" content="it_IT" />
		<meta property="og:title" content="Stefano Tedeschi — Senior Frontend Engineer · CV interattivo" />
		<meta
			property="og:description"
			content="Senior Frontend Engineer a Torino (Vue, React, TypeScript, design system). Un curriculum che attraversa undici ere della UI/UX, dal Terminale Unix al Futuro 3D."
		/>
		<meta property="og:image" content="https://stefanotedeschi.it/og-image.jpg" />
		<meta property="og:image:type" content="image/jpeg" />
		<meta property="og:image:width" content="1731" />
		<meta property="og:image:height" content="909" />
		<meta property="og:image:alt" content="CV di Stefano Tedeschi attraverso le ere della UI/UX, dal terminale al 3D" />
		<meta property="og:url" content="https://stefanotedeschi.it" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Stefano Tedeschi — Senior Frontend Engineer · CV interattivo" />
		<meta
			name="twitter:description"
			content="Senior Frontend Engineer a Torino (Vue, React, TypeScript, design system). Un curriculum che attraversa undici ere della UI/UX, dal Terminale Unix al Futuro 3D."
		/>
		<meta name="twitter:image" content="https://stefanotedeschi.it/og-image.jpg" />
		<meta name="twitter:image:alt" content="CV di Stefano Tedeschi attraverso le ere della UI/UX, dal terminale al 3D" />

		<!-- Structured data (Person) -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Stefano Tedeschi",
				"jobTitle": "Senior Frontend Engineer",
				"description": "Senior Frontend Engineer con oltre 10 anni di esperienza in architetture frontend, design system condivisi e component library riutilizzabili. Lavora con Vue, React e TypeScript in contesti enterprise (fintech, IoT, banking).",
				"url": "https://stefanotedeschi.it",
				"image": "https://stefanotedeschi.it/avatar.svg",
				"email": "mailto:stefano.tedeschi@protechstudio.it",
				"telephone": "+39 3478736835",
				"sameAs": ["https://www.linkedin.com/in/stefano-tedeschi-developer/"],
				"address": { "@type": "PostalAddress", "addressLocality": "Torino", "addressRegion": "Piemonte", "addressCountry": "IT" },
				"hasOccupation": {
					"@type": "Occupation",
					"name": "Senior Frontend Engineer",
					"occupationLocation": { "@type": "City", "name": "Torino" },
					"skills": "Vue 3, React, Svelte, Angular, TypeScript, JavaScript, design system, frontend architecture, Tailwind CSS, GraphQL"
				},
				"worksFor": { "@type": "Organization", "name": "Tundr Tech Corporation s.r.l." },
				"alumniOf": [
					{ "@type": "EducationalOrganization", "name": "Mediagroup Service" },
					{ "@type": "EducationalOrganization", "name": "Istituto Tecnico Tecnologico Modesto Panetti" }
				],
				"knowsLanguage": [
					{ "@type": "Language", "name": "Italian", "alternateName": "it" },
					{ "@type": "Language", "name": "English", "alternateName": "en" }
				],
				"knowsAbout": [
					"Frontend Architecture",
					"Design Systems",
					"Component Library",
					"Vue 3",
					"React",
					"Svelte",
					"Angular",
					"TypeScript",
					"JavaScript",
					"Tailwind CSS",
					"GraphQL",
					"Pinia",
					"Redux",
					"Nx Monorepo",
					"Storybook",
					"Flutter"
				]
			}
		</script>

		<!-- Fonts are self-hosted (latin subset) via src/lib/fonts.css — no render-blocking
		     external stylesheet. Preload only the Timeline font, which is always on screen. -->
		<link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk.woff2" crossorigin />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
