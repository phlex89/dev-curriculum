<!doctype html>

		<!-- Open Graph -->
		<meta property="og:type" content="profile" />
		<meta property="og:locale" content="it_IT" />
		<meta property="og:title" content="Stefano Tedeschi — Frontend Architect · CV interattivo" />

			property="og:description"
			content="Frontend Architect a Torino: architetture frontend e design system che fanno scalare prodotti e team. Un curriculum che attraversa undici ere della UI/UX, dal Terminale Unix al Futuro 3D."
		/>
		<meta property="og:image" content="https://www.stefanotedeschi.it/og-image.jpg" />
		<meta property="og:image:type" content="image/jpeg" />
		<meta property="og:image:width" content="1731" />

		<!-- Structured data (Person) -->
		<script type="application/ld+json">
			{

				"image": "https://www.stefanotedeschi.it/avatar.svg",
				"email": "mailto:stefano.tedeschi@protechstudio.it",
				"telephone": "+39 3478736835",
				"sameAs": ["https://www.linkedin.com/in/stefano-tedeschi-developer/"],
				"address": { "@type": "PostalAddress", "addressLocality": "Torino", "addressRegion": "Piemonte", "addressCountry": "IT" },
				"hasOccupation": {
					"@type": "Occupation",
					"name": "Frontend Architect",
					"occupationLocation": { "@type": "City", "name": "Torino" },
					"skills": "Vue 3, React, Svelte, Angular, TypeScript, JavaScript, design system, frontend architecture, GraphQL"
				},
				"worksFor": { "@type": "Organization", "name": "Tundr Tech Corporation s.r.l." },
				"alumniOf": [
					{ "@type": "EducationalOrganization", "name": "Mediagroup Service" },
					{ "@type": "EducationalOrganization", "name": "Istituto Tecnico Tecnologico Modesto Panetti" }
				],
				"knowsLanguage": [
					{ "@type": "Language", "name": "Italian", "alternateName": "it" },
					{ "@type": "Language", "name": "English", "alternateName": "en" }
				],
				"knowsAbout": [
					"Frontend Architecture",
					"Design Systems",
					"Component Library",
					"Vue 3",
					"React",
					"Svelte",
					"Angular",
					"TypeScript",
					"JavaScript",
					"GraphQL",
					"Pinia",
					"Redux",
					"Nx Monorepo",
					"Storybook",
					"Flutter"
				]
			}
		</script>

		<!-- Favicon / PWA -->
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Stefano Tedeschi" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Fonts are self-hosted (latin subset) via src/lib/fonts.css — no render-blocking
		     external stylesheet. Preload only the Timeline font, which is always on screen. -->
		<link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk.woff2" crossorigin />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
